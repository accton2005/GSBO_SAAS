<!doctype html>
<html lang="en">
  <head>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This makes window.fetch writable or provides a setter so libraries can wrap it.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;

          var currentFetch = originalFetch;

          function defineOn(obj) {
            try {
              Object.defineProperty(obj, 'fetch', {
                get: function() { return currentFetch; },
                set: function(v) { currentFetch = v; },
                configurable: true,
                enumerable: true
              });
              return true;
            } catch (e) {
              return false;
            }
          }

          // Try to define on window directly
          if (defineOn(window)) return;

          // If that fails, try to define on the prototype where the getter might live
          var proto = window.Window ? window.Window.prototype : Object.getPrototypeOf(window);
          while (proto && proto !== Object.prototype) {
            try {
              var desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
              if (desc && (desc.get || desc.set || desc.writable === false)) {
                if (defineOn(proto)) return;
              }
            } catch (e) {}
            proto = Object.getPrototypeOf(proto);
          }
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
